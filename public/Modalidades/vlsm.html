    <style>
        :root {
            --orange-main: #ff7b00;
            --orange-soft: rgba(255, 123, 0, 0.1);

            --text: #f0f6fc;
            --text-dim: #8b949e;
            --border: rgba(255, 255, 255, 0.12);

            --tooltip-bg: rgba(22, 27, 34, 0.98);
        }

        body.light {
            --bg: #f6f8fa;
            --card: rgba(255, 255, 255, 0.9);
            --text: #1f2328;

            --border: rgba(0, 0, 0, 0.1);

            color: var(--text);

            padding: 15px;

            align-items: center;
            min-height: 100vh;
            transition: background-color 0.4s ease, color 0.4s ease;
            opacity: 0;
            box-sizing: border-box;
        }

        .container { width: 100%; max-width: 1150px; flex: 1; position: relative; }

        .top-nav {
            position: absolute;
            top: 10px;
            right: 0;
            z-index: 100;
        }

        .btn-theme {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;

    <script>
        const AUTH_COOKIE_NAME = 'DGNV_AUTH';
        const AUTH_SIG_NAME = 'DGNV_AUTH_SIG';
        const AUTH_SECRET = 'DGNV_SESSION_2026';

        function getCookie(name) {
            const cookie = document.cookie
                .split(';')
                .map(item => item.trim())
                .find(item => item.startsWith(name + '='));
            return cookie ? cookie.split('=')[1] : '';
        }

        function setCookie(name, value, days = 7) {
            const date = new Date();
            date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
            const secure = location.protocol === 'https:' ? '; Secure' : '';
            document.cookie = `${name}=${value}; path=/; SameSite=Strict${secure}; expires=${date.toUTCString()}`;
        }

        function deleteCookie(name) {
            const secure = location.protocol === 'https:' ? '; Secure' : '';
            document.cookie = `${name}=; path=/; SameSite=Strict${secure}; expires=Thu, 01 Jan 1970 00:00:00 GMT`;
        }

        function signAuth(value) {
            let hash = 0;
            const text = value + AUTH_SECRET;
            for (let i = 0; i < text.length; i++) {
                hash = ((hash << 5) - hash) + text.charCodeAt(i);
                hash |= 0;
            }
            return (hash >>> 0).toString(36);
        }

        function authCookieValid() {
            return getCookie(AUTH_COOKIE_NAME) === '1' && getCookie(AUTH_SIG_NAME) === signAuth('1');
        }

        function requireAuth() {
            if (!authCookieValid()) window.location.replace('/main.html');
        }

        requireAuth();
    </script>

    <script>
        // Lógica de Protección de Sesión
        (function() {
            if (!authCookieValid()) {
                window.location.replace('/main.html');
            } else {
                document.addEventListener('DOMContentLoaded', () => {
                    document.getElementById('mainBody').style.opacity = '1';
                });
            }
        })();

        // Tema
        const body = document.getElementById('mainBody');
        function toggleTheme() {
            const newTheme = body.classList.contains('dark') ? 'light' : 'dark';
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        }
        function applyTheme(theme) {
            const icon = document.getElementById('t-icon');
            const text = document.getElementById('t-text');
            if (theme === 'light') {
                body.classList.replace('dark', 'light');
                if(icon) icon.innerText = '☀️'; if(text) text.innerText = 'Modo Claro';
            } else {
                body.classList.replace('light', 'dark');
                if(icon) icon.innerText = '🌙'; if(text) text.innerText = 'Modo Oscuro';
            }
        }
        window.onload = () => applyTheme(localStorage.getItem('theme') || 'dark');

        // LÓGICA MANUAL IP
        function toggleManualIp() {
            document.getElementById('manualIpCont').classList.toggle('active');
        }

        // AGREGAR INPUT DE HOST DINÁMICO
        function addHostInput() {
            const container = document.getElementById('hostsContainer');
            const currentFields = container.getElementsByClassName('host-field').length;
            
            const newInput = document.createElement('input');
            newInput.type = 'number';
            newInput.className = 'input-main host-field';
            newInput.placeholder = `LAN ${currentFields + 1}`;
            newInput.style.cssText = "width: 75px; font-size: 0.75rem; padding: 8px 5px; height: 38px; border-radius: 8px;";
            
            container.appendChild(newInput);
        }

        // Lógica VLSM MEJORADA
        let currentExercise = [];
        const i2p = i => [(i >>> 24) & 255, (i >>> 16) & 255, (i >>> 8) & 255, i & 255].join('.');
        const p2i = p => p.split('.').reduce((a, o) => (a << 8) + parseInt(o, 10), 0) >>> 0;
        const getMask = p => i2p((0xFFFFFFFF << (32 - p)) >>> 0);

        function validateIpString(ip) {
            const parts = ip.split('.');
            if (parts.length !== 4) return false;
            return parts.every(part => {
                if (!/^\d+$/.test(part)) return false;
                const value = Number(part);
                return value >= 0 && value <= 255;
            });
        }

        function presentError(title, message) {
            const modalTitle = document.querySelector('#customModal h3');
            modalTitle.innerText = title;
            document.getElementById('modalMessage').innerText = message;
            document.getElementById('customModal').style.display = 'flex';
        }

        function getBlockInfo(hosts) {
            const requiredHosts = Math.max(2, hosts + 2);
            const size = Math.pow(2, Math.ceil(Math.log2(requiredHosts)));
            return {
                hosts,
                size,
                prefix: 32 - Math.log2(size)
            };
        }

        function createAutoHostRequests(totalAvailableIPs) {
            const candidateBlocks = [4096, 2048, 1024, 512, 256, 128, 64, 32, 16, 8, 4];
            const requests = [];
            let remaining = totalAvailableIPs;
            const maxNetworks = 4;

            for (let blockSize of candidateBlocks) {
                while (
                    requests.length < maxNetworks &&
                    remaining >= blockSize &&
                    remaining - blockSize >= (maxNetworks - requests.length - 1) * 4
                ) {
                    requests.push(blockSize - 2);
                    remaining -= blockSize;
                }
            }

            while (requests.length < maxNetworks && remaining >= 4) {
                const target = Math.min(256, remaining - (maxNetworks - requests.length - 1) * 4);
                const fallback = Math.pow(2, Math.floor(Math.log2(target)));
                requests.push(fallback - 2);
                remaining -= fallback;
            }

            if (requests.length === 0) {
                requests.push(2);
            }

            return requests;
        }

        function generateLab() {
            const maskRaw = document.getElementById('maskInput').value.trim();
            let pBase;
            if (maskRaw === '') {
                const minMask = 8, maxMask = 30;
                pBase = Math.floor(Math.random() * (maxMask - minMask + 1)) + minMask;
                document.getElementById('maskInput').value = pBase;
            } else {
                pBase = Number(maskRaw);
            }

            if (!Number.isInteger(pBase) || pBase < 8 || pBase > 30) {
                presentError('⚠️ FORMATO INVÁLIDO', 'USA UNA MÁSCARA ENTRE 8 Y 30.');
                return;
            }

            let manualIp = document.getElementById('manualIpInput').value.trim();
            let finalBaseIp;

            if (manualIp !== '') {
                if (!validateIpString(manualIp)) {
                    presentError('⚠️ DIRECCIÓN ERRÓNEA', 'IP MANUAL INVÁLIDA.');
                    return;
                }
                finalBaseIp = p2i(manualIp) & (0xFFFFFFFF << (32 - pBase));
            } else {
                let firstOctet;
                if (pBase <= 15) firstOctet = Math.floor(Math.random() * 126) + 1;
                else if (pBase <= 23) firstOctet = Math.floor(Math.random() * (191 - 128 + 1)) + 128;
                else firstOctet = Math.floor(Math.random() * (223 - 192 + 1)) + 192;

                const o2 = Math.floor(Math.random() * 256);
                const o3 = Math.floor(Math.random() * 256);
                const o4 = Math.floor(Math.random() * 256);
                const randomIP = `${firstOctet}.${o2}.${o3}.${o4}`;
                finalBaseIp = p2i(randomIP) & (0xFFFFFFFF << (32 - pBase));
            }

            const hostFields = document.getElementsByClassName('host-field');
            let reqs = [];
            for (let field of hostFields) {
                const value = Number(field.value);
                if (!Number.isNaN(value) && value > 0) {
                    reqs.push(Math.trunc(value));
                }
            }

            if (reqs.length === 0) {
                reqs = createAutoHostRequests(Math.pow(2, 32 - pBase));
            }

            reqs = reqs.filter(count => count > 0);
            reqs.sort((a, b) => b - a);

            const totalAvailableIPs = Math.pow(2, 32 - pBase);
            const blocks = reqs.map(hosts => getBlockInfo(hosts));

            const singleOverflow = blocks.some(block => block.size > totalAvailableIPs);
            if (singleOverflow) {
                presentError(
                    '⚠️ SEGMENTO IMPOSIBLE',
                    'ERROR: UNA SOLA RED NECESITA MÁS ESPACIO DEL QUE OFRECE LA MÁSCARA BASE.'
                );
                return;
            }

            const totalRequestedIPs = blocks.reduce((sum, block) => sum + block.size, 0);
            if (totalRequestedIPs > totalAvailableIPs) {
                presentError(
                    '⚠️ COALICIÓN DE DIRECCIONES',
                    'ERROR: LA SUMATORIA DE BLOQUES DE SUBRED EXCEDE EL ESPACIO DISPONIBLE.'
                );
                return;
            }

            document.getElementById('ipDisplay').innerText = `${i2p(finalBaseIp)}/${pBase}`;

            currentExercise = [];
            let pointer = finalBaseIp;
            const tbody = document.getElementById('tableContent');
            tbody.innerHTML = '';

            blocks.forEach((block, index) => {
                const { size, prefix, hosts } = block;
                const networkId = i2p(pointer);
                const firstIp = i2p(pointer + 1);
                const lastIp = i2p(pointer + size - 2);
                const broadcast = i2p(pointer + size - 1);

                const data = {
                    id: networkId,
                    pref: prefix.toString(),
                    mask: getMask(prefix),
                    f: firstIp,
                    l: lastIp,
                    b: broadcast
                };

                currentExercise.push(data);
                tbody.innerHTML += `
                    <tr class="reveal-row" style="animation-delay: ${index * 0.1}s">
                        <td style="font-size:0.5rem; font-weight:700">LAN_${index + 1}</td>
                        <td style="color:var(--orange-main); font-weight:bold">${hosts}</td>
                        <td><input type="text" class="cell-input w-ip" id="id_${index}" placeholder="0.0.0.0"></td>
                        <td><input type="text" class="cell-input w-pref" id="p_${index}" placeholder="${prefix}"></td>
                        <td><input type="text" class="cell-input w-mask" id="m_${index}" placeholder="${getMask(prefix)}"></td>
                        <td><input type="text" class="cell-input w-ip" id="f_${index}"></td>
                        <td><input type="text" class="cell-input w-ip" id="l_${index}"></td>
                        <td><input type="text" class="cell-input w-ip" id="b_${index}"></td>
                    </tr>`;

                pointer += size;
            });

            document.getElementById('labArea').style.display = 'block';
        }

        function verifyAnswers() {
            currentExercise.forEach((s, i) => {
                const keys = ['id', 'pref', 'mask', 'f', 'l', 'b'];
                const fields = ['id', 'p', 'm', 'f', 'l', 'b'];
                fields.forEach((fieldKey, idx) => {
                    const el = document.getElementById(`${fieldKey}_${i}`);
                    if (!el) return;
                    el.classList.remove('correct', 'incorrect');
                    el.classList.add(el.value.trim() === s[keys[idx]] ? 'correct' : 'incorrect');
                });
            });
        }
        function closeModal() { document.getElementById('customModal').style.display = 'none'; }

        // LÓGICA CALCULADORA
        let calcExp = "";
        function toggleCalc(e) {
            e.stopPropagation();
            const widget = document.getElementById('calc-widget');
            if (widget.classList.contains('modo-btn')) {
                widget.classList.remove('modo-btn'); widget.classList.add('modo-exp');
            } else {
                if (e.target.classList.contains('calc-close') || e.target === widget) {
                    widget.classList.remove('modo-exp'); widget.classList.add('modo-btn');
                }
            }
        }
        function actionCalc(e, val) {
            e.stopPropagation();
            if (val === 'C') { calcExp = ""; document.getElementById('calc-display-input').value = ""; }
            else if (val === '=') solveCalc();
            else pressCalc(val);
        }
        function pressCalc(val) {
            const display = document.getElementById('calc-display-input');
            calcExp += val;
            let visual = val === '*' ? 'x' : (val === '/' ? '÷' : val);
            display.value += visual;
        }
        function solveCalc() {
            try {
                let result;
                if (calcExp.includes('^')) {
                    let parts = calcExp.split('^');
                    result = Math.pow(parseFloat(parts[0]), parseFloat(parts[1]));
                } else {
                    let cleanExp = calcExp.replace('×', '*').replace('÷', '/');
                    result = eval(cleanExp);
                }
                document.getElementById('calc-display-input').value = result;
                calcExp = result.toString();
            } catch (e) {
                document.getElementById('calc-display-input').value = "ERR";
                calcExp = "";
            }
        }
    </script>
