<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio — DGNV Studios</title>
    <link rel="icon" type="image/png" href="../img/webfav.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Roboto+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange-main: #ff7b00;
            --orange-soft: rgba(255, 123, 0, 0.1);
            --radius-lg: 20px;
            --radius-md: 12px;
            --transition: all 0.25s ease;
            --font-pixel: 'Press Start 2P', cursive;
        }

        body.dark {
            --bg: #0a0c10;
            --card: rgba(22, 27, 34, 0.8);
            --text: #f0f6fc;
            --text-dim: #8b949e;
            --border: rgba(255, 255, 255, 0.12);
            --input-bg: rgba(0, 0, 0, 0.3);
        }

        body.light {
            --bg: #f6f8fa;
            --card: rgba(255, 255, 255, 0.9);
            --text: #1f2328;
            --text-dim: #636c76;
            --border: rgba(0, 0, 0, 0.1);
            --input-bg: #ffffff;
        }

        body {
            font-family: var(--font-pixel);
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.4s ease, color 0.4s ease;
            box-sizing: border-box;
        }

        .container { width: 100%; max-width: 1150px; flex: 1; position: relative; }

        /* NAVEGACIÓN SUPERIOR */
        .top-nav { position: absolute; top: 10px; right: 0; z-index: 100; }
        .btn-theme {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 8px 14px; border-radius: 50px; font-family: 'Inter', sans-serif;
            font-size: 0.75rem; font-weight: bold; cursor: pointer; display: flex;
            align-items: center; gap: 8px; transition: var(--transition);
        }
        .btn-theme:hover { border-color: var(--orange-main); color: var(--orange-main); }
        .btn-back { display: inline-block; margin-bottom: 20px; text-decoration: none; color: var(--orange-main); font-size: 0.6rem; transition: opacity 0.3s; }
        .btn-back:hover { opacity: 0.7; }

        .header { text-align: center; margin-bottom: 35px; width: 100%; }
        h2 { font-weight: 400; margin: 0; font-size: 1.4rem; text-transform: uppercase; }
        h2 span { color: var(--orange-main); }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        
        /* CUADRO DE PERFIL DE GITHUB */
        .profile-card { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .profile-avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--orange-main); background: #000; }
        .profile-info { flex: 1; text-align: left; }
        .profile-name { font-size: 0.75rem; color: var(--orange-main); margin-bottom: 5px; }
        .profile-bio { font-family: 'Inter', sans-serif; font-size: 0.85rem; color: var(--text-dim); margin: 0; line-height: 1.4; }

        /* REPO GRID STYLE (IGUAL A CPU DATABASE) */
        .repo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; width: 100%; margin-bottom: 50px; }
        .repo-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 20px; display: flex; flex-direction: column; justify-content: space-between; transition: var(--transition); text-decoration: none; color: inherit; }
        .repo-card:hover { border-color: var(--orange-main); transform: translateY(-2px); box-shadow: 0 5px 15px var(--orange-soft); }
        
        .repo-name { font-family: var(--font-pixel); font-size: 0.65rem; color: var(--orange-main); margin: 0 0 12px 0; line-height: 1.4; word-break: break-all; }
        .repo-desc { font-family: 'Inter', sans-serif; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 36px; line-height: 1.3; }
        
        .spec-line { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 8px; }
        .spec-label { font-family: var(--font-pixel); font-size: 0.4rem; color: var(--text-dim); }
        .spec-value { font-family: 'Roboto Mono', monospace; font-weight: 700; color: var(--text); }
        
        .repo-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px; }
        .repo-link-text { font-family: var(--font-pixel); font-size: 0.4rem; color: var(--orange-main); text-transform: uppercase; }
        .launch-year { margin: 0; font-family: var(--font-pixel); font-size: 0.45rem; color: var(--text-dim); }
        
        .label-text { font-size: 0.55rem; color: var(--text-dim); text-transform: uppercase; text-align: center; margin-bottom: 20px; }
        .loading-text { font-family: 'Roboto Mono', monospace; font-size: 1rem; color: var(--orange-main); text-align: center; width: 100%; padding: 40px 0; }

        footer { padding: 20px; color: var(--text-dim); font-size: 0.5rem; text-align: center; text-transform: uppercase; }
    </style>
</head>
<body class="dark" id="mainBody">

    <div class="container">
        <div class="top-nav">
            <button class="btn-theme" onclick="toggleTheme()">
                <span id="t-icon">🌙</span> <span id="t-text">Modo Oscuro</span>
            </button>
        </div>

        <a href="../menu.html" class="btn-back">< REGRESAR</a>

        <header class="header"><h2>PORTFOLIO | <span>REPOS</span></h2></header>
        
        <section class="card" id="profileContainer" style="display: none;">
            <div class="profile-card">
                <img id="userAvatar" class="profile-avatar" src="" alt="Avatar">
                <div class="profile-info">
                    <div id="userName" class="profile-name">---</div>
                    <p id="userBio" class="profile-bio">Conectando con la API de GitHub...</p>
                </div>
            </div>
        </section>

        <div class="label-text">> PROYECTOS DESPLEGADOS EN REPOSITORIOS PÚBLICOS</div>

        <main class="repo-grid" id="repoGridContainer">
            <div class="loading-text">> INICIALIZANDO PROTOCOLO DE BÚSQUEDA...</div>
        </main>

        <footer>© 2026 DGNV STUDIOS</footer>
    </div>

    <script>
        // CONFIGURACIÓN CENTRALIZADA: Pon tu usuario de GitHub aquí
        const GITHUB_USER = "mdranvv077"; 

        // Manejo del Tema Estilo DGNV
        const body = document.getElementById('mainBody');
        function toggleTheme() {
            const isDark = body.classList.contains('dark');
            applyTheme(isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }
        function applyTheme(theme) {
            const icon = document.getElementById('t-icon');
            const text = document.getElementById('t-text');
            if (theme === 'light') {
                body.classList.replace('dark', 'light');
                icon.innerText = '☀️'; text.innerText = 'Modo Claro';
            } else {
                body.classList.replace('light', 'dark');
                icon.innerText = '🌙'; text.innerText = 'Modo Oscuro';
            }
        }

        // Conectividad con GitHub API
        async function fetchGitHubData() {
            const gridContainer = document.getElementById('repoGridContainer');
            
            if(GITHUB_USER === "TU_USUARIO_DE_GITHUB" || !GITHUB_USER) {
                gridContainer.innerHTML = `<div class="loading-text" style="color: #da3633">> ERROR: CONFIGURA TU GITHUB_USER EN EL SCRIPT.</div>`;
                return;
            }

            try {
                // 1. Obtener información de tu Perfil
                const profileResponse = await fetch(`https://api.github.com/users/${GITHUB_USER}`);
                if (profileResponse.ok) {
                    const profileData = await profileResponse.json();
                    document.getElementById('userAvatar').src = profileData.avatar_url;
                    document.getElementById('userName').innerText = (profileData.name || profileData.login).toUpperCase();
                    document.getElementById('userBio').innerText = profileData.bio || "Desarrollador / Creador de contenido en DGNV Studios.";
                    document.getElementById('profileContainer').style.display = 'block';
                }

                // 2. Obtener tus Repositorios públicos ordenados por actualización reciente
                const reposResponse = await fetch(`https://api.github.com/users/${GITHUB_USER}/repos?sort=updated&per_page=12`);
                if (!reposResponse.ok) throw new Error("No se pudo obtener la información.");
                
                const repos = await reposResponse.json();
                
                // Filtrar las bifurcaciones (forks) si prefieres mostrar solo tus proyectos propios
                const proyectosPropios = repos.filter(repo => !repo.fork);

                if(proyectosPropios.length === 0) {
                    gridContainer.innerHTML = `<div class="loading-text">> NO SE ENCONTRARON REPOSITORIOS PÚBLICOS.</div>`;
                    return;
                }

                // Renderizar las tarjetas
                gridContainer.innerHTML = proyectosPropios.map(repo => {
                    const añoActualizacion = new Date(repo.updated_at).getFullYear();
                    const descripcion = repo.description || "Sin descripción disponible en este repositorio.";
                    const lenguaje = repo.language || "Markdown";

                    return `
                        <a href="${repo.html_url}" target="_blank" class="repo-card">
                            <div>
                                <h4 class="repo-name">${repo.name.toUpperCase()}</h4>
                                <p class="repo-desc">${descripcion}</p>
                            </div>
                            <div>
                                <div class="spec-line">
                                    <span class="spec-label">LENGUAJE</span>
                                    <span class="spec-value">${lenguaje}</span>
                                </div>
                                <div class="spec-line">
                                    <span class="spec-label">STARS</span>
                                    <span class="spec-value">★ ${repo.stargazers_count}</span>
                                </div>
                                <div class="repo-footer">
                                    <span class="repo-link-text">[ VER EN GITHUB ]</span>
                                    <span class="launch-year">AÑO: ${añoActualizacion}</span>
                                </div>
                            </div>
                        </a>
                    `;
                }).join('');

            } catch (error) {
                console.error(error);
                gridContainer.innerHTML = `<div class="loading-text" style="color: #da3633">> ERROR AL CONECTAR CON LA API DE GITHUB.</div>`;
            }
        }

        window.onload = () => {
            applyTheme(localStorage.getItem('theme') || 'dark');
            fetchGitHubData();
        };
    </script>
</body>
</html>
