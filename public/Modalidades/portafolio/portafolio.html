<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio — DGNV Studios</title>
    <link rel="icon" type="image/png" href="../../img/webfav.png">
    <link rel="icon" type="image/png" href="../img/webfav.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Roboto+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange-main: #ff7b00;
            --orange-soft: rgba(255, 123, 0, 0.1);
            --radius-lg: 20px;
            --radius-md: 12px;
            --transition: all 0.25s ease;
            --font-pixel: 'Press Start 2P', cursive;
        }

        body.dark {
            --bg: #0a0c10;
            --card: rgba(22, 27, 34, 0.8);
            --text: #f0f6fc;
            --text-dim: #8b949e;
            --border: rgba(255, 255, 255, 0.12);
            --input-bg: rgba(0, 0, 0, 0.3);
        }

        body.light {
            --bg: #f6f8fa;
            --card: rgba(255, 255, 255, 0.9);
            --text: #1f2328;
            --text-dim: #636c76;
            --border: rgba(0, 0, 0, 0.1);
            --input-bg: #ffffff;
        }

        body {
            font-family: var(--font-pixel);
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.4s ease, color 0.4s ease;
            box-sizing: border-box;
        }

        .container { width: 100%; max-width: 1150px; flex: 1; position: relative; }

        /* NAVEGACIÓN SUPERIOR */
        .top-nav { position: absolute; top: 10px; right: 0; z-index: 100; }
        .btn-theme {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 8px 14px; border-radius: 50px; font-family: 'Inter', sans-serif;
            font-size: 0.75rem; font-weight: bold; cursor: pointer; display: flex;
            align-items: center; gap: 8px; transition: var(--transition);
        }
        .btn-theme:hover { border-color: var(--orange-main); color: var(--orange-main); }
        .btn-back { display: inline-block; margin-bottom: 20px; text-decoration: none; color: var(--orange-main); font-size: 0.6rem; transition: opacity 0.3s; }
        .btn-back:hover { opacity: 0.7; }

        .header { text-align: center; margin-bottom: 35px; width: 100%; }
        h2 { font-weight: 400; margin: 0; font-size: 1.4rem; text-transform: uppercase; }
        h2 span { color: var(--orange-main); }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        
        /* CUADRO DE PERFIL DE GITHUB */
        .profile-card { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .profile-avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--orange-main); background: #000; }
        .profile-info { flex: 1; text-align: left; }
        .profile-name { font-size: 0.75rem; color: var(--orange-main); margin-bottom: 5px; }
        .profile-bio { font-family: 'Inter', sans-serif; font-size: 0.85rem; color: var(--text-dim); margin: 0; line-height: 1.4; }

        /* REPO GRID STYLE (IGUAL A CPU DATABASE) */
        .repo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; width: 100%; margin-bottom: 50px; }
        .repo-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 20px; display: flex; flex-direction: column; justify-content: space-between; transition: var(--transition); text-decoration: none; color: inherit; }
        .repo-card:hover { border-color: var(--orange-main); transform: translateY(-2px); box-shadow: 0 5px 15px var(--orange-soft); }
        
        .repo-name { font-family: var(--font-pixel); font-size: 0.65rem; color: var(--orange-main); margin: 0 0 12px 0; line-height: 1.4; word-break: break-all; }
        .repo-desc { font-family: 'Inter', sans-serif; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 20px; min-height: 44px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
        
        .spec-line { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 8px; }
        .spec-label { font-family: var(--font-pixel); font-size: 0.4rem; color: var(--text-dim); }
        .spec-value { font-family: 'Roboto Mono', monospace; font-weight: 700; color: var(--text); }
        
        .repo-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px; gap: 12px; flex-wrap: wrap; }
        .repo-link-text { font-family: var(--font-pixel); font-size: 0.4rem; color: var(--orange-main); text-transform: uppercase; text-decoration: none; }
        .repo-link-text:hover { opacity: 0.8; }
        .launch-year { margin: 0; font-family: var(--font-pixel); font-size: 0.45rem; color: var(--text-dim); }

        #spotify-widget {
            position: fixed; bottom: 30px; left: 30px; z-index: 1000;
            background: var(--card); border: 2px solid var(--orange-main);
            backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        #spotify-widget.modo-btn { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        #spotify-widget.modo-btn:hover { transform: scale(1.1) rotate(-5deg); background: var(--orange-main); }
        #spotify-widget.modo-exp { width: 280px; min-height: 260px; border-radius: 18px; padding: 15px; cursor: default; }
        #spotify-full-content, #spotify-icon-content { transition: opacity 0.3s ease; }
        #spotify-widget.modo-btn #spotify-full-content { opacity: 0; pointer-events: none; display: none; }
        #spotify-widget.modo-exp #spotify-icon-content { opacity: 0; pointer-events: none; display: none; }
        #spotify-widget.modo-exp #spotify-full-content { opacity: 1; display: block; }
        #spotify-widget.modo-btn #spotify-icon-content { opacity: 1; display: flex; }
        #spotify-icon-content svg { width: 30px; height: 30px; stroke: var(--orange-main); transition: stroke 0.3s; }
        #spotify-widget.modo-btn:hover svg { stroke: white; }
        .spotify-header { font-family: var(--font-pixel); font-size: 0.65rem; color: var(--orange-main); margin-bottom: 12px; display: flex; justify-content: space-between; text-transform: uppercase; }
        .spotify-close { cursor: pointer; user-select: none; transition: color 0.2s; }
        .spotify-close:hover { color: #ff4444; }
        .spotify-status { font-family: 'Inter', sans-serif; font-size: 0.75rem; color: var(--text); margin-bottom: 12px; line-height: 1.4; }
        .spotify-current, .spotify-line, .spotify-note, .spotify-error { font-family: 'Inter', sans-serif; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; line-height: 1.4; }
        .spotify-current strong, .spotify-line strong { color: var(--text); }
        .spotify-next-title { font-family: var(--font-pixel); font-size: 0.55rem; color: var(--orange-main); text-transform: uppercase; margin-top: 10px; margin-bottom: 6px; }
        .spotify-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .spotify-actions button { background: var(--orange-main); color: white; border: none; border-radius: 999px; padding: 8px 10px; font-family: var(--font-pixel); font-size: 0.55rem; cursor: pointer; transition: var(--transition); }
        .spotify-actions button:hover { filter: brightness(1.05); }

        .repo-card { cursor: pointer; }
        .repo-card.selected { border-color: var(--orange-main); box-shadow: 0 0 0 2px rgba(255, 123, 0, 0.13); }
        .label-text { font-size: 0.55rem; color: var(--text-dim); text-transform: uppercase; text-align: center; margin-bottom: 20px; }
        .loading-text { font-family: 'Roboto Mono', monospace; font-size: 1rem; color: var(--orange-main); text-align: center; width: 100%; padding: 40px 0; }

        footer { padding: 20px; color: var(--text-dim); font-size: 0.5rem; text-align: center; text-transform: uppercase; }
    </style>
</head>

    <script>
        const AUTH_COOKIE_NAME = 'DGNV_AUTH';
        const AUTH_SIG_NAME = 'DGNV_AUTH_SIG';
        const AUTH_SECRET = 'DGNV_SESSION_2026';

        function getCookie(name) {
            const cookie = document.cookie.split('; ').find(item => item.startsWith(name + '='));
            return cookie ? cookie.split('=')[1] : '';
        }

        function setCookie(name, value, days = 7) {
            const date = new Date();
            date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
            const secure = location.protocol === 'https:' ? '; Secure' : '';
            document.cookie = `${name}=${value}; path=/; SameSite=Strict${secure}; expires=${date.toUTCString()}`;
        }

        function deleteCookie(name) {
            const secure = location.protocol === 'https:' ? '; Secure' : '';
            document.cookie = `${name}=; path=/; SameSite=Strict${secure}; expires=Thu, 01 Jan 1970 00:00:00 GMT`;
        }

        function signAuth(value) {
            let hash = 0;
            const text = value + AUTH_SECRET;
            for (let i = 0; i < text.length; i++) {
                hash = ((hash << 5) - hash) + text.charCodeAt(i);
                hash |= 0;
            }
            return (hash >>> 0).toString(36);
        }

        function authCookieValid() {
            return getCookie(AUTH_COOKIE_NAME) === '1' && getCookie(AUTH_SIG_NAME) === signAuth('1');
        }

        function requireAuth() {
            if (!authCookieValid()) window.location.replace('/main.html');
        }

        requireAuth();
    </script>

    <script>
        // CONFIGURACIÓN CENTRALIZADA: Pon tu usuario de GitHub aquí
        const GITHUB_USER = "mdranvv077"; 

        // Manejo del Tema Estilo DGNV
        const body = document.getElementById('mainBody');
        function toggleTheme() {
            const isDark = body.classList.contains('dark');
            applyTheme(isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }
        function applyTheme(theme) {
            const icon = document.getElementById('t-icon');
            const text = document.getElementById('t-text');
            if (theme === 'light') {
                body.classList.replace('dark', 'light');
                icon.innerText = '☀️'; text.innerText = 'Modo Claro';
            } else {
                body.classList.replace('light', 'dark');
                icon.innerText = '🌙'; text.innerText = 'Modo Oscuro';
            }
        }

        // Conectividad con GitHub API
        async function fetchGitHubData() {
            const gridContainer = document.getElementById('repoGridContainer');
            
            if(GITHUB_USER === "TU_USUARIO_DE_GITHUB" || !GITHUB_USER) {
                gridContainer.innerHTML = `<div class="loading-text" style="color: #da3633">> ERROR: CONFIGURA TU GITHUB_USER EN EL SCRIPT.</div>`;
                return;
            }

            try {
                // 1. Obtener información de tu Perfil
                const profileResponse = await fetch(`https://api.github.com/users/${GITHUB_USER}`);
                if (profileResponse.ok) {
                    const profileData = await profileResponse.json();
                    document.getElementById('userAvatar').src = profileData.avatar_url;
                    document.getElementById('userName').innerText = (profileData.name || profileData.login).toUpperCase();
                    document.getElementById('userBio').innerText = profileData.bio || "Desarrollador / Creador de contenido en DGNV Studios.";
                    document.getElementById('profileContainer').style.display = 'block';
                }

                // 2. Obtener tus Repositorios públicos ordenados por actualización reciente
                const reposResponse = await fetch(`https://api.github.com/users/${GITHUB_USER}/repos?sort=updated&per_page=12`);
                if (!reposResponse.ok) throw new Error("No se pudo obtener la información.");
                
                const repos = await reposResponse.json();
                
                // Filtrar las bifurcaciones (forks) si prefieres mostrar solo tus proyectos propios
                const proyectosPropios = repos.filter(repo => !repo.fork);

                if(proyectosPropios.length === 0) {
                    gridContainer.innerHTML = `<div class="loading-text">> NO SE ENCONTRARON REPOSITORIOS PÚBLICOS.</div>`;
                    return;
                }

                // Renderizar las tarjetas
                gridContainer.innerHTML = proyectosPropios.map(repo => {
                    const añoActualizacion = new Date(repo.updated_at).getFullYear();
                    const descripcion = repo.description || "Sin descripción disponible en este repositorio.";
                    const lenguaje = repo.language || "Markdown";

                    return `
                        <article class="repo-card" data-repo-name="${repo.name}" data-repo-url="${repo.html_url}">
                            <div>
                                <h4 class="repo-name">${repo.name.toUpperCase()}</h4>
                                <p class="repo-desc">${descripcion}</p>
                            </div>
                            <div>
                                <div class="spec-line">
                                    <span class="spec-label">LENGUAJE</span>
                                    <span class="spec-value">${lenguaje}</span>
                                </div>
                                <div class="spec-line">
                                    <span class="spec-label">STARS</span>
                                    <span class="spec-value">★ ${repo.stargazers_count}</span>
                                </div>
                                <div class="repo-footer">
                                    <a class="repo-link-text" href="${repo.html_url}" target="_blank">[ VER EN GITHUB ]</a>
                                    <span class="launch-year">AÑO: ${añoActualizacion}</span>
                                </div>
                            </div>
                        </article>
                    `;
                }).join('');

                setupRepoSelection();

            } catch (error) {
                console.error(error);
                gridContainer.innerHTML = `<div class="loading-text" style="color: #da3633">> ERROR AL CONECTAR CON LA API DE GITHUB.</div>`;
            }
        }

        let selectedCard = null;

        function setupRepoSelection() {
            const cards = document.querySelectorAll('.repo-card');
            cards.forEach(card => {
                card.addEventListener('click', () => selectRepoCard(card));
            });
        }

        function selectRepoCard(card) {
            if (selectedCard) selectedCard.classList.remove('selected');
            selectedCard = card;
            selectedCard.classList.add('selected');
        }

        const SPOTIFY_TOKEN_KEY = 'DGNV_SPOTIFY_TOKEN';

        function getSpotifyToken() {
            return localStorage.getItem(SPOTIFY_TOKEN_KEY) || '';
        }

        function setSpotifyToken(token) {
            localStorage.setItem(SPOTIFY_TOKEN_KEY, token);
            updateSpotifyTokenUI();
        }

        function clearSpotifyToken() {
            localStorage.removeItem(SPOTIFY_TOKEN_KEY);
            updateSpotifyTokenUI();
        }

        function updateSpotifyTokenUI() {
            const status = document.getElementById('spotify-connection-status');
            const btn = document.getElementById('spotify-connect-btn');
            const clearBtn = document.getElementById('spotify-clear-btn');
            if (!status || !btn || !clearBtn) return;
            const token = getSpotifyToken();
            if (token) {
                status.textContent = 'Token Spotify cargado. Haz click para actualizar.';
                btn.textContent = 'Actualizar';
                clearBtn.style.display = 'inline-flex';
            } else {
                status.textContent = 'Presiona Conectar para pegar tu token de Spotify.';
                btn.textContent = 'Conectar';
                clearBtn.style.display = 'none';
                document.getElementById('spotify-track-list').innerHTML = '';
            }
        }

        async function promptSpotifyToken() {
            // Intentar iniciar flujo OAuth si el servidor expone client_id
            try {
                const cfg = await fetch('/api/spotify/config').then(r => r.json());
                const client_id = cfg.client_id;
                const redirect_uri = window.location.origin + window.location.pathname;
                if (client_id) {
                    const scope = encodeURIComponent('user-read-currently-playing user-read-playback-state');
                    const authUrl = `https://accounts.spotify.com/authorize?response_type=code&client_id=${encodeURIComponent(client_id)}&scope=${scope}&redirect_uri=${encodeURIComponent(redirect_uri)}&show_dialog=true`;
                    window.location.href = authUrl;
                    return;
                }
            } catch (e) {
                console.warn('No se pudo leer client_id desde servidor:', e);
            }

            // Fallback manual (antiguo): pegar token directamente
            const token = prompt('Pega tu token de acceso Spotify (Bearer):');
            if (token && token.trim()) {
                setSpotifyToken(token.trim());
                fetchSpotifyPlayback();
            }
        }

        // Manejar callback con ?code= en la URL: intercambiar por tokens en el servidor
        (async function handleSpotifyCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if (!code) return;
            // Limpiar parámetros de URL para UX
            const newUrl = window.location.origin + window.location.pathname;
            window.history.replaceState({}, document.title, newUrl);

            const redirect_uri = window.location.origin + window.location.pathname;
            try {
                const resp = await fetch('/api/spotify/exchange', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, redirect_uri })
                });
                const data = await resp.json();
                if (data.access_token) {
                    setSpotifyToken(data.access_token);
                    if (data.refresh_token) localStorage.setItem('DGNV_SPOTIFY_REFRESH', data.refresh_token);
                    fetchSpotifyPlayback();
                } else {
                    const statusEl = document.getElementById('spotify-connection-status');
                    if (statusEl) statusEl.textContent = 'Error al intercambiar código: ' + (data.error || JSON.stringify(data));
                }
            } catch (err) {
                console.error(err);
                const statusEl = document.getElementById('spotify-connection-status');
                if (statusEl) statusEl.textContent = 'Error intercambiando el código con el servidor.';
            }
        })();

        function toggleSpotifyWidget(e) {
            e.stopPropagation();
            const widget = document.getElementById('spotify-widget');
            if (!widget) return;
            if (widget.classList.contains('modo-btn')) {
                widget.classList.remove('modo-btn');
                widget.classList.add('modo-exp');
                updateSpotifyTokenUI();
                fetchSpotifyPlayback();
            } else {
                if (e.target.classList.contains('spotify-close') || e.target === widget) {
                    widget.classList.remove('modo-exp');
                    widget.classList.add('modo-btn');
                }
            }
        }

        function formatDuration(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = String(totalSeconds % 60).padStart(2, '0');
            return `${minutes}:${seconds}`;
        }

        async function fetchSpotifyPlayback() {
            const token = getSpotifyToken();
            const status = document.getElementById('spotify-connection-status');
            const trackList = document.getElementById('spotify-track-list');
            if (!status || !trackList) return;
            if (!token) {
                status.textContent = 'Necesitas un token de Spotify para ver tu reproducción.';
                trackList.innerHTML = '';
                return;
            }

            status.textContent = 'Obteniendo datos de Spotify...';
            trackList.innerHTML = '';

            try {
                const currentResp = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                    headers: { Authorization: `Bearer ${token}` }
                });

                // Si el token expiró, intentar refrescar usando refresh token almacenado
                if (currentResp.status === 401) {
                    const refresh = localStorage.getItem('DGNV_SPOTIFY_REFRESH');
                    if (refresh) {
                        const refreshResp = await fetch('/api/spotify/refresh', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ refresh_token: refresh })
                        });
                        const refreshData = await refreshResp.json();
                        if (refreshData.access_token) {
                            setSpotifyToken(refreshData.access_token);
                            if (refreshData.refresh_token) localStorage.setItem('DGNV_SPOTIFY_REFRESH', refreshData.refresh_token);
                            // reintentar la llamada original
                            return fetchSpotifyPlayback();
                        }
                    }
                }

                if (currentResp.status === 204) {
                    status.textContent = 'No hay reproducción activa en Spotify.';
                    return;
                }

                if (!currentResp.ok) throw new Error('Error al solicitar reproducción actual.');
                const currentData = await currentResp.json();
                const queueResp = await fetch('https://api.spotify.com/v1/me/player/queue', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const queueData = queueResp.ok ? await queueResp.json() : null;
                renderSpotifyState(currentData, queueData);
            } catch (error) {
                console.error(error);
                status.textContent = 'Error Spotify: verifica tu token y permisos.';
                trackList.innerHTML = `<div class="spotify-error">${error.message || 'No se pudo conectar con Spotify.'}</div>`;
            }
        }

        function renderSpotifyState(currentData, queueData) {
            const status = document.getElementById('spotify-connection-status');
            const trackList = document.getElementById('spotify-track-list');
            if (!status || !trackList) return;
            if (!currentData || !currentData.item) {
                status.textContent = 'No hay pista activa en reproducción.';
                trackList.innerHTML = '';
                return;
            }

            const item = currentData.item;
            const artists = item.artists.map(artist => artist.name).join(', ');
            const progress = formatDuration(currentData.progress_ms || 0);
            const duration = formatDuration(item.duration_ms || 0);

            status.innerHTML = `Reproduciendo ahora:`;
            trackList.innerHTML = `
                <div class="spotify-current"><strong>${artists} - ${item.name}</strong></div>
                <div class="spotify-current">${item.album.name} · ${progress} / ${duration}</div>
            `;

            if (queueData && Array.isArray(queueData.queue) && queueData.queue.length > 0) {
                const nextItems = queueData.queue.slice(0, 3);
                trackList.innerHTML += `<div class="spotify-next-title">Próximas ${nextItems.length} canciones:</div>`;
                nextItems.forEach((track, index) => {
                    const trackArtists = track.artists.map(artist => artist.name).join(', ');
                    trackList.innerHTML += `
                        <div class="spotify-line">${index + 1}. <strong>${trackArtists} - ${track.name}</strong></div>
                    `;
                });
            } else {
                trackList.innerHTML += `<div class="spotify-note">No se pudo obtener la cola de reproducción o no hay próximas canciones.</div>`;
            }
        }

        window.onload = () => {
            applyTheme(localStorage.getItem('theme') || 'dark');
            updateSpotifyTokenUI();
            fetchGitHubData();
        };
    </script>
</body>
</html>
