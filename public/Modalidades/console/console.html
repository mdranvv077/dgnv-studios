<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola CentOS 10 — DGNV Studios</title>
    <link rel="icon" type="image/png" href="../../img/webfav.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Roboto+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange-main: #ff7b00;
            --orange-soft: rgba(255, 123, 0, 0.12);
            --radius-lg: 20px;
            --radius-md: 12px;
            --transition: all 0.25s ease;
            --font-pixel: 'Press Start 2P', cursive;
        }

        body.dark {
            --bg: #0a0c10;
            --card: rgba(12, 18, 26, 0.92);
            --text: #cbd5e1;
            --text-dim: #8b949e;
            --border: rgba(255, 255, 255, 0.12);
            --input-bg: rgba(7, 11, 16, 0.82);
            --tooltip-bg: rgba(22, 27, 34, 0.98);
            --terminal-bg: #071014;
            --terminal-text: #d5e3f0;
            --prompt-color: #7dd3fc;
        }

        body.light {
            --bg: #eef2f8;
            --card: rgba(255, 255, 255, 0.94);
            --text: #1f2328;
            --text-dim: #64748b;
            --border: rgba(15, 23, 42, 0.12);
            --input-bg: #f8fafc;
            --tooltip-bg: rgba(255, 255, 255, 0.98);
            --terminal-bg: #ffffff;
            --terminal-text: #141a24;
            --prompt-color: #0f172a;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100vh;
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-pixel);
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            padding: 24px;
            opacity: 0;
        }

        .container {
            width: min(100%, 1120px);
            display: flex;
            flex-direction: column;
            gap: 18px;
            position: relative;
        }

        .top-nav {
            position: absolute;
            top: 0;
            right: 0;
            z-index: 100;
        }

        .btn-theme {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 9px 16px;
            border-radius: 999px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .btn-back {
            display: inline-block;
            text-decoration: none;
            color: var(--orange-main);
            font-size: 0.75rem;
            font-family: 'Press Start 2P', cursive;
            transition: opacity 0.3s;
            margin-bottom: 4px;
        }

        .btn-back:hover {
            opacity: 0.8;
        }

        .header {
            text-align: center;
            margin-top: 12px;
        }

        .header h2 {
            font-size: 1.35rem;
            margin: 0;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .header h2 span {
            color: var(--orange-main);
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: 0 22px 48px rgba(0, 0, 0, 0.18);
            display: grid;
            gap: 18px;
        }

        .terminal-output {
            background: var(--terminal-bg);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 16px;
            min-height: 360px;
            padding: 22px;
            overflow-y: auto;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.95rem;
            line-height: 1.55;
            color: var(--terminal-text);
            white-space: pre-wrap;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02), 0 18px 38px rgba(0, 0, 0, 0.18);
        }

        .terminal-input-row {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 16px;
            align-items: center;
        }

        .host-settings {
            display: grid;
            gap: 10px;
        }

        .host-settings label {
            display: block;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
        }

        .host-settings-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-save {
            background: var(--orange-main);
            color: #ffffff;
            border: none;
            border-radius: 999px;
            padding: 12px 18px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-save:hover {
            opacity: 0.92;
        }

        .prompt {
            font-family: 'Roboto Mono', monospace;
            color: var(--prompt-color);
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .command-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: var(--input-bg);
            color: var(--terminal-text);
            font-size: 0.95rem;
            font-family: 'Roboto Mono', monospace;
            outline: none;
        }

        .command-input::placeholder {
            color: var(--text-dim);
        }

        .command-input:focus {
            border-color: rgba(125, 211, 252, 0.55);
            box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.14);
        }

        @media (max-width: 720px) {
            .terminal-input-row {
                grid-template-columns: 1fr;
            }

            .prompt {
                width: 100%;
            }

            .host-settings-row {
                flex-direction: column;
                align-items: stretch;
            }

            .btn-save {
                width: 100%;
            }
        }

        .status,
        .help {
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            color: var(--text-dim);
        }

        .status span,
        .help code {
            color: var(--orange-main);
            font-family: 'Roboto Mono', monospace;
        }

        .log-entry {
            margin: 0 0 0.65rem;
        }

        .log-success { color: #7dd3fc; }
        .log-warning { color: #fbbf24; }
        .log-error { color: #f87171; }

        footer {
            text-align: center;
            font-size: 0.74rem;
            color: var(--text-dim);
            padding-bottom: 14px;
        }

        @media (max-width: 720px) {
            body {
                padding: 16px;
            }

            .container {
                width: 100%;
            }

            .terminal-input-row {
                grid-template-columns: 1fr;
            }

            .prompt {
                width: 100%;
            }
        }
    </style>
</head>
<body class="dark" id="mainBody">
    <script>
        const AUTH_COOKIE_NAME = 'DGNV_AUTH';
        const AUTH_SIG_NAME = 'DGNV_AUTH_SIG';
        const AUTH_SECRET = 'DGNV_SESSION_2026';

        function getCookie(name) {
            const cookie = document.cookie
                .split(';')
                .map(item => item.trim())
                .find(item => item.startsWith(name + '='));
            return cookie ? cookie.split('=')[1] : '';
        }

        function setCookie(name, value, days = 365) {
            const date = new Date();
            date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
            const secure = location.protocol === 'https:' ? '; Secure' : '';
            document.cookie = `${name}=${value}; path=/; SameSite=Strict${secure}; expires=${date.toUTCString()}`;
        }

        function signAuth(value) {
            let hash = 0;
            const text = value + AUTH_SECRET;
            for (let i = 0; i < text.length; i++) {
                hash = ((hash << 5) - hash) + text.charCodeAt(i);
                hash |= 0;
            }
            return (hash >>> 0).toString(36);
        }

        function authCookieValid() {
            return getCookie(AUTH_COOKIE_NAME) === '1' && getCookie(AUTH_SIG_NAME) === signAuth('1');
        }

        function requireAuth() {
            if (!authCookieValid()) window.location.replace('/main.html');
        }

        requireAuth();
    </script>

    <div class="container">
        <div class="top-nav">
            <button class="btn-theme" id="themeButton" onclick="toggleTheme()">
                <span id="t-icon"></span> <span id="t-text">Modo Oscuro</span>
            </button>
        </div>

        <a href="/menu.html" class="btn-back">&lt; REGRESAR</a>

        <header class="header">
            <h2>Consola CentOS 10 | <span>TERMINAL</span></h2>
        </header>

        <section class="card">
            <div class="terminal-output" id="output" aria-live="polite"></div>

            <div class="terminal-input-row">
                <div class="prompt" id="promptLabel">[root@centos10 ~]#</div>
                <input id="commandInput" class="command-input" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="Escribe ipconfig y presiona Enter" />
            </div>

            <div class="host-settings">
                <label for="hostNameInput">Nombre de host</label>
                <div class="host-settings-row">
                    <input id="hostNameInput" class="command-input" type="text" maxlength="20" placeholder="centos10" />
                    <button id="saveHostButton" class="btn-save" type="button">Guardar nombre</button>
                </div>
            </div>

            <div class="status">Comandos habilitados: <span>ipconfig</span></div>
            <div class="help">Solo el comando activado funciona. Si no estás autenticado, serás redirigido a <code>main.html</code>.</div>
        </section>

        <footer> 2026 DGNV STUDIOS</footer>
    </div>

    <script>
        const outputEl = document.getElementById('output');
        const inputEl = document.getElementById('commandInput');
        const hostNameInput = document.getElementById('hostNameInput');
        const saveHostButton = document.getElementById('saveHostButton');
        let hostName = 'centos10';

        const commands = {
            ipconfig: async () => {
                appendLog('Ejecutando ipconfig...', 'log-success');
                appendLog('Buscando dirección pública...', 'log-success');

                try {
                    const response = await fetch('https://api.ipify.org?format=json', { cache: 'no-store' });
                    if (!response.ok) {
                        throw new Error(`Error ${response.status}`);
                    }

                    const data = await response.json();
                    appendLog(`
eth0: flags=4163<UP,BROADCAST,RUNNING,MULTICAST>  mtu 1500
    inet ${data.ip}  netmask 255.255.255.255  broadcast ${data.ip}
    inet6 fe80::a00:27ff:fe4e:66a1  prefixlen 64  scopeid 0x20<link>
    ether 08:00:27:4e:66:a1  txqueuelen 1000  (Ethernet)
    RX packets 0  bytes 0 (0.0 B)
    TX packets 0  bytes 0 (0.0 B)
`, 'log-success');
                    appendLog('Nota: esta página no almacena la IP en localStorage ni en servidores DGNV.', 'log-warning');
                } catch (error) {
                    appendLog('No fue posible obtener la IP pública.', 'log-error');
                    appendLog('Verifica tu conexión a internet o usa un servicio compatible.', 'log-error');
                }
            }
        };

        const blockedMessage = 'Comando no permitido. Solo se aceptan los comandos habilitados.';

        function appendLog(message, type = '') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`.trim();
            entry.textContent = message;
            outputEl.appendChild(entry);
            outputEl.scrollTop = outputEl.scrollHeight;
        }

        function executeCommand(rawCommand) {
            const command = rawCommand.trim().toLowerCase();
            if (!command) return;

            appendLog(`[root@${hostName} ~]# ${rawCommand}`);

            if (commands[command]) {
                commands[command]();
            } else {
                appendLog(blockedMessage, 'log-error');
            }
        }

        function setHostName(name) {
            hostName = name || 'centos10';
            document.getElementById('promptLabel').textContent = `[root@${hostName} ~]#`;
        }

        function loadHostName() {
            const savedHost = getCookie('DGNV_TERM_HOST');
            if (savedHost) {
                setHostName(savedHost);
                hostNameInput.value = savedHost;
            } else {
                hostNameInput.value = hostName;
            }
        }

        function saveHostName() {
            const newHost = hostNameInput.value.trim() || 'centos10';
            setCookie('DGNV_TERM_HOST', newHost, 365);
            setHostName(newHost);
            appendLog(`Nombre de host guardado: ${newHost}`, 'log-success');
        }

        inputEl.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                executeCommand(inputEl.value);
                inputEl.value = '';
            }
        });

        function applyTheme(theme) {
            const icon = document.getElementById('t-icon');
            const text = document.getElementById('t-text');
            if (theme === 'light') {
                document.body.classList.replace('dark', 'light');
                icon.innerText = '☀️';
                text.innerText = 'Modo Claro';
            } else {
                document.body.classList.replace('light', 'dark');
                icon.innerText = '🌙';
                text.innerText = 'Modo Oscuro';
            }
        }

        function toggleTheme() {
            const newTheme = document.body.classList.contains('dark') ? 'light' : 'dark';
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        }

        window.onload = () => {
            applyTheme(localStorage.getItem('theme') || 'dark');
            loadHostName();
            saveHostButton.addEventListener('click', saveHostName);
            document.body.style.opacity = '1';
            inputEl.focus();
            appendLog('Último inicio de sesión: mar jul  1 12:34:56 2026 desde 192.168.0.2');
            appendLog('CentOS Linux release 10 (K10)');
            appendLog('Kernel 6.8.0-1.el10.x86_64 on an x86_64');
            appendLog('');
            appendLog('Bienvenido a la terminal DGNV. Solo el comando ipconfig está habilitado.');
        };
    </script>
</body>
</html>
