<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Database — DGNV Studios</title>
    <link rel="icon" type="image/png" href="../../img/webfav.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Roboto+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --orange-main: #ff7b00; --orange-soft: rgba(255, 123, 0, 0.1); --radius-lg: 20px; --radius-md: 12px; --transition: all 0.25s ease; --font-pixel: 'Press Start 2P', cursive; }
        body.dark { --bg: #0a0c10; --card: rgba(22, 27, 34, 0.8); --text: #f0f6fc; --text-dim: #8b949e; --border: rgba(255, 255, 255, 0.12); --input-bg: rgba(0, 0, 0, 0.3); }
        body.light { --bg: #f6f8fa; --card: rgba(255, 255, 255, 0.9); --text: #1f2328; --text-dim: #636c76; --border: rgba(0, 0, 0, 0.1); --input-bg: #ffffff; }

        body { font-family: var(--font-pixel); background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: background-color 0.4s ease, color 0.4s ease; box-sizing: border-box; }
        .container { width: 100%; max-width: 1150px; flex: 1; position: relative; }

        /* NAVEGACIÓN ESTILO VLSM */
        .top-nav { position: absolute; top: 10px; right: 0; z-index: 100; }
        .btn-theme {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 8px 14px; border-radius: 50px; font-family: 'Inter', sans-serif;
            font-size: 0.75rem; font-weight: bold; cursor: pointer; display: flex;
            align-items: center; gap: 8px; transition: var(--transition);
        }
        .btn-theme:hover { border-color: var(--orange-main); color: var(--orange-main); }
        .btn-back { display: inline-block; margin-bottom: 20px; text-decoration: none; color: var(--orange-main); font-size: 0.6rem; transition: opacity 0.3s; }
        .btn-back:hover { opacity: 0.7; }

        .header { text-align: center; margin-bottom: 35px; width: 100%; }
        h2 { font-weight: 400; margin: 0; font-size: 1.4rem; text-transform: uppercase; }
        h2 span { color: var(--orange-main); }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; }
        .filter-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .select-custom { background: var(--input-bg); border: 2px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px; font-family: 'Roboto Mono', monospace; font-size: 0.8rem; width: 100%; cursor: pointer; outline: none; }

        .cpu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; width: 100%; margin-bottom: 50px; }
        .cpu-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 20px; }
        .cpu-name { font-family: var(--font-pixel); font-size: 0.7rem; color: var(--orange-main); margin-bottom: 20px; line-height: 1.5; }
        .spec-line { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 8px; }
        .spec-label { font-family: var(--font-pixel); font-size: 0.4rem; color: var(--text-dim); }
        .spec-value { font-family: 'Roboto Mono', monospace; font-weight: 700; }
        .launch-year { margin-top: 15px; font-family: var(--font-pixel); font-size: 0.45rem; color: var(--orange-main); text-align: right; border-top: 1px solid var(--border); padding-top: 10px; }
        footer { font-family: var(--font-pixel); font-size: 0.4rem; color: var(--text-dim); text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body class="dark" id="mainBody">
    <script>
        const AUTH_COOKIE_NAME = 'DGNV_AUTH';
        const AUTH_SIG_NAME = 'DGNV_AUTH_SIG';
        const AUTH_SECRET = 'DGNV_SESSION_2026';

        function getCookie(name) {
            const cookie = document.cookie.split('; ').find(item => item.startsWith(name + '='));
            return cookie ? cookie.split('=')[1] : '';
        }

        function setCookie(name, value, days = 7) {
            const date = new Date();
            date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
            const secure = location.protocol === 'https:' ? '; Secure' : '';
            document.cookie = `${name}=${value}; path=/; SameSite=Strict${secure}; expires=${date.toUTCString()}`;
        }

        function deleteCookie(name) {
            const secure = location.protocol === 'https:' ? '; Secure' : '';
            document.cookie = `${name}=; path=/; SameSite=Strict${secure}; expires=Thu, 01 Jan 1970 00:00:00 GMT`;
        }

        function signAuth(value) {
            let hash = 0;
            const text = value + AUTH_SECRET;
            for (let i = 0; i < text.length; i++) {
                hash = ((hash << 5) - hash) + text.charCodeAt(i);
                hash |= 0;
            }
            return (hash >>> 0).toString(36);
        }

        function authCookieValid() {
            return getCookie(AUTH_COOKIE_NAME) === '1' && getCookie(AUTH_SIG_NAME) === signAuth('1');
        }

        function requireAuth() {
            if (!authCookieValid()) window.location.replace('/main.html');
        }

        requireAuth();
    </script>

    <div class="container">
        <div class="top-nav">
            <button class="btn-theme" onclick="toggleTheme()">
                <span id="t-icon">🌙</span> <span id="t-text">Modo Oscuro</span>
            </button>
        </div>

        <a href="../../menu.html" class="btn-back">< REGRESAR</a>

        <header class="header"><h2>CPU | <span>DATABASE</span></h2></header>
        
        <section class="card">
            <div class="filter-group">
                <select id="filterFamily" class="select-custom" onchange="updateModels()" disabled><option>CARGANDO...</option></select>
                <select id="filterModel" class="select-custom" onchange="updateModelsSelection()" disabled><option>MODELO</option></select>
                <select id="filterGen" class="select-custom" onchange="updateGensSelection()" disabled><option>GENERACIÓN</option></select>
            </div>
        </section>

        <main class="cpu-grid" id="cpuGridContainer"></main>
        <footer>© 2026 DGNV STUDIOS</footer>
    </div>

    <script>
        const body = document.getElementById('mainBody');
        function toggleTheme() {
            const isDark = body.classList.contains('dark');
            isDark ? applyTheme('light') : applyTheme('dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }
        function applyTheme(theme) {
            const icon = document.getElementById('t-icon');
            const text = document.getElementById('t-text');
            if (theme === 'light') {
                body.classList.replace('dark', 'light');
                if(icon) icon.innerText = '☀️'; if(text) text.innerText = 'Modo Claro';
            } else {
                body.classList.replace('light', 'dark');
                if(icon) icon.innerText = '🌙'; if(text) text.innerText = 'Modo Oscuro';
            }
        }
        window.onload = () => {
            applyTheme(localStorage.getItem('theme') || 'dark');
            fetchDatabase();
        };

        let cpuDatabase = [];
        const filterStructure = {
            "core": { label: "Intel Core", models: ["i3", "i5", "i7", "i9"] },
            "core ultra": { label: "Core Ultra", models: ["ultra 5", "ultra 7", "ultra 9"] },
            "xeon": { label: "Intel Xeon", models: ["e3", "e5", "e7", "Bronze", "Silver", "Gold", "Platinum"] }
        };

        async function fetchDatabase() {
            try {
                const response = await fetch('./database.json');
                cpuDatabase = await response.json();
                const fSelect = document.getElementById('filterFamily');
                fSelect.innerHTML = '<option value="">FAMILIA</option>';
                Object.keys(filterStructure).forEach(k => fSelect.innerHTML += `<option value="${k}">${filterStructure[k].label}</option>`);
                fSelect.disabled = false;
                renderGrid(cpuDatabase);
            } catch (e) { console.error("Error cargando JSON:", e); }
        }

        function updateModels() {
            const f = document.getElementById('filterFamily').value;
            const m = document.getElementById('filterModel');
            const g = document.getElementById('filterGen');
            m.innerHTML = '<option value="">MODELO</option>';
            g.innerHTML = '<option value="">GENERACIÓN</option>';
            if(f && filterStructure[f]) {
                filterStructure[f].models.forEach(mod => m.innerHTML += `<option value="${mod}">${mod.toUpperCase()}</option>`);
                m.disabled = false;
            } else { m.disabled = true; }
            filterProcessors();
        }

        function updateModelsSelection() {
            const m = document.getElementById('filterModel');
            const g = document.getElementById('filterGen');
            if (m.value !== "") {
                g.value = ""; g.disabled = true;
                const gens = [...new Set(cpuDatabase.filter(c => c.model.toLowerCase() === m.value).map(c => c.gen))];
                g.innerHTML = '<option value="">GENERACIÓN</option>';
                gens.forEach(gen => g.innerHTML += `<option value="${gen}">${gen}</option>`);
            } else { g.disabled = false; }
            filterProcessors();
        }

        function updateGensSelection() {
            const m = document.getElementById('filterModel');
            const g = document.getElementById('filterGen');
            if (g.value !== "") { m.value = ""; m.disabled = true; } else { m.disabled = false; }
            filterProcessors();
        }

        function filterProcessors() {
            const f = document.getElementById('filterFamily').value;
            const m = document.getElementById('filterModel').value;
            const g = document.getElementById('filterGen').value;
            const filtered = cpuDatabase.filter(c => 
                (!f || c.family === f) && (!m || c.model.toLowerCase() === m) && (!g || c.gen === g)
            );
            renderGrid(filtered);
        }

        function renderGrid(data) {
            document.getElementById('cpuGridContainer').innerHTML = data.map(c => `
                <div class="cpu-card">
                    <h4 class="cpu-name">${c.name.toUpperCase()}</h4>
                    <div class="spec-line"><span class="spec-label">NÚCLEOS</span><span class="spec-value">${c.cores}</span></div>
                    <div class="spec-line"><span class="spec-label">SOCKET</span><span class="spec-value">${c.socket}</span></div>
                    <div class="launch-year">AÑO: ${c.year}</div>
                </div>`).join('');
        }
    </script>
</body>
</html>
