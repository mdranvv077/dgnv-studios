<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comentarios — DGNV Studios</title>
    <link rel="icon" type="image/png" href="../../img/webfav.png">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange-main: #ff7b00;
            --bg: #0a0c10;
            --card: rgba(22, 27, 34, 0.8);
            --border: rgba(255, 255, 255, 0.12);
            --text: #f0f6fc;
            --transition: all 0.25s ease;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Roboto Mono', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- BOTÓN REGRESAR --- */
        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: var(--orange-main);
            font-size: 0.75rem;
            font-family: 'Press Start 2P', cursive;
            transition: opacity 0.3s;
        }
        .btn-back:hover { opacity: 0.8; }

        .container {
            width: 100%;
            max-width: 800px; /* Más ancho */
            margin-top: 20px;
        }

        .top-nav {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .btn-theme {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            box-shadow: none;
            width: auto;
        }

        .btn-theme:hover { border-color: var(--orange-main); color: var(--orange-main); }

        h2 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.2rem; /* Más grande */
            color: var(--orange-main);
            text-align: center;
            margin-bottom: 40px;
            text-transform: uppercase;
            line-height: 1.5;
        }

        /* --- FORMULARIO --- */
        .input-section {
            background: var(--card);
            border: 2px solid var(--border);
            padding: 30px; /* Más espacio */
            border-radius: 18px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input, textarea {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            color: white;
            font-family: 'Roboto Mono', monospace;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-size: 1.1rem; /* Texto más grande */
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--orange-main);
            outline: none;
        }

        button {
            background: var(--orange-main);
            color: white;
            border: none;
            padding: 18px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem; /* Más grande */
            cursor: pointer;
            width: 100%;
            border-radius: 10px;
            transition: all 0.2s;
            box-shadow: 0 4px 0px #b35600;
        }
        .btn-theme {
            box-shadow: none;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* --- LISTA DE COMENTARIOS --- */
        .feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 50px;
        }

        .post {
            background: var(--card);
            border-left: 6px solid var(--orange-main); /* Borde más grueso */
            padding: 25px;
            border-radius: 8px;
            animation: fadeIn 0.5s ease-out;
            backdrop-filter: blur(5px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user { 
            color: var(--orange-main); 
            font-weight: bold; 
            font-size: 1.1rem; 
        }

        .flag {
            width: 24px; /* Bandera más grande */
            height: auto;
            border-radius: 3px;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .date { 
            color: #8b949e; 
            font-size: 0.75rem; 
        }

        .content { 
            font-size: 1.15rem; /* Contenido más grande */
            line-height: 1.6; 
            color: #e6edf3; 
            word-wrap: break-word;
        }

        .reply-post {
            margin-left: 24px;
            border-left: 4px solid #8b949e;
            background: rgba(255,255,255,0.03);
        }

        .actions {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 10px;
        }

        .reply-toggle {
            background: transparent;
            border: 1px solid var(--orange-main);
            color: var(--orange-main);
            padding: 10px 14px;
            font-size: 0.65rem;
            min-width: 100px;
            width: auto;
            border-radius: 8px;
            box-shadow: none;
        }

        .reply-area {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 14px;
        }

        .reply-area.active {
            display: flex;
        }

        .reply-area textarea {
            min-height: 80px;
        }

        .reply-area button {
            max-width: 220px;
            align-self: flex-end;
        }

        .actions button {
            margin: 0;
        }

        .post {
            position: relative;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            h2 { font-size: 0.9rem; }
            .input-section { padding: 20px; }
            .post { padding: 18px; }
            .user { font-size: 1rem; }
            .content { font-size: 1rem; }
        }
    </style>
</head>
<body id="mainBody" class="dark">
    <script>
        const AUTH_COOKIE_NAME = 'DGNV_AUTH';
        const AUTH_SIG_NAME = 'DGNV_AUTH_SIG';
        const AUTH_SECRET = 'DGNV_SESSION_2026';

        function getCookie(name) {
            const cookie = document.cookie
                .split(';')
                .map(item => item.trim())
                .find(item => item.startsWith(name + '='));
            return cookie ? cookie.split('=')[1] : '';
        }

        function setCookie(name, value, days = 7) {
            const date = new Date();
            date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
            const secure = location.protocol === 'https:' ? '; Secure' : '';
            document.cookie = `${name}=${value}; path=/; SameSite=Strict${secure}; expires=${date.toUTCString()}`;
        }

        function deleteCookie(name) {
            const secure = location.protocol === 'https:' ? '; Secure' : '';
            document.cookie = `${name}=; path=/; SameSite=Strict${secure}; expires=Thu, 01 Jan 1970 00:00:00 GMT`;
        }

        function signAuth(value) {
            let hash = 0;
            const text = value + AUTH_SECRET;
            for (let i = 0; i < text.length; i++) {
                hash = ((hash << 5) - hash) + text.charCodeAt(i);
                hash |= 0;
            }
            return (hash >>> 0).toString(36);
        }

        function authCookieValid() {
            return getCookie(AUTH_COOKIE_NAME) === '1' && getCookie(AUTH_SIG_NAME) === signAuth('1');
        }

        function requireAuth() {
            if (!authCookieValid()) window.location.replace('/main.html');
        }

        function toggleTheme() {
            const newTheme = document.body.classList.contains('dark') ? 'light' : 'dark';
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        }

        function applyTheme(theme) {
            const bodyElement = document.getElementById('mainBody');
            const icon = document.getElementById('t-icon');
            const text = document.getElementById('t-text');
            if (!bodyElement) return;
            if (theme === 'light') {
                bodyElement.classList.replace('dark', 'light');
                if (icon) icon.innerText = '☀️';
                if (text) text.innerText = 'Modo Claro';
            } else {
                bodyElement.classList.replace('light', 'dark');
                if (icon) icon.innerText = '🌙';
                if (text) text.innerText = 'Modo Oscuro';
            }
        }

        requireAuth();
    </script>

    <div class="container">
        <div class="top-nav">
            <button class="btn-theme" onclick="toggleTheme()">
                <span id="t-icon">🌙</span> <span id="t-text">Modo Oscuro</span>
            </button>
        </div>
        <a href="../../menu.html" class="btn-back">< REGRESAR</a>
        
        <h2>> FORO_COMUNITARIO_DGNV</h2>

        <div class="input-section">
            <input type="text" id="username" placeholder="Tu Alias (Auto-guardado)" maxlength="15">
            <textarea id="commentText" rows="4" placeholder="Escribe tu mensaje aquí..." maxlength="250"></textarea>
            <button onclick="postComment()">ENVIAR AL SISTEMA</button>
        </div>

        <div id="feed" class="feed">
            </div>
    </div>

    <script>
        window.onload = () => {
            applyTheme(localStorage.getItem('theme') || 'dark');
            const savedUser = localStorage.getItem('dgnv_username');
            if (savedUser) {
                document.getElementById('username').value = savedUser;
            }
            loadComments();
            // Auto-refresh cada 30 segundos para ver nuevos comentarios
            setInterval(loadComments, 30000);
        };

        async function loadComments() {
            try {
                const res = await fetch('/api/comentarios');
                const comments = await res.json();
                const feed = document.getElementById('feed');
                
                if (comments.length === 0) {
                    feed.innerHTML = "<p style='text-align:center; color:gray;'>No hay mensajes aún. ¡Sé el primero!</p>";
                    return;
                }

                const commentsById = new Map();
                comments.forEach(c => {
                    c.replies = [];
                    commentsById.set(c.id, c);
                });

                const rootComments = [];
                comments.forEach(c => {
                    if (c.parent_id && commentsById.has(c.parent_id)) {
                        commentsById.get(c.parent_id).replies.push(c);
                    } else {
                        rootComments.push(c);
                    }
                });

                const renderComment = (comment, level = 0) => `
                    <div class="post${level ? ' reply-post' : ''}">
                        <div class="post-header">
                            <div class="user-info">
                                <span class="user">${comment.usuario}</span>
                                <img src="https://flagcdn.com/w40/${comment.pais}.png" 
                                     class="flag" 
                                     alt="Pais: ${comment.pais}">
                            </div>
                            <span class="date">${comment.fecha}</span>
                        </div>
                        <div id="comment-content-${comment.id}" class="content">${comment.texto}</div>
                        <div class="actions">
                            <button class="reply-toggle" onclick="toggleReplyForm(${comment.id})">RESPONDER</button>
                            ${comment.can_modify ? `
                                <button class="reply-toggle" onclick="startEdit(${comment.id})">EDITAR</button>
                                <button class="reply-toggle" onclick="deleteComment(${comment.id})">ELIMINAR</button>
                            ` : ''}
                        </div>
                        <div id="reply-area-${comment.id}" class="reply-area">
                            <textarea id="reply-text-${comment.id}" rows="3" placeholder="Escribe tu respuesta..." maxlength="250"></textarea>
                            <button onclick="postComment(${comment.id})">Responder</button>
                        </div>
                        <div id="edit-area-${comment.id}" class="reply-area">
                            <textarea id="edit-text-${comment.id}" rows="3" placeholder="Edita tu comentario..." maxlength="250"></textarea>
                            <button onclick="confirmEdit(${comment.id})">Guardar</button>
                        </div>
                        ${comment.replies.map(reply => renderComment(reply, level + 1)).join('')}
                    </div>
                `;

                feed.innerHTML = rootComments.reverse().map(comment => renderComment(comment)).join('');
            } catch (err) {
                console.error("Error al sincronizar con el foro", err);
            }
        }

        function toggleReplyForm(commentId) {
            const area = document.getElementById(`reply-area-${commentId}`);
            if (!area) return;
            area.classList.toggle('active');
        }

        function toggleEditForm(commentId) {
            const area = document.getElementById(`edit-area-${commentId}`);
            if (!area) return;
            area.classList.toggle('active');
        }

        function startEdit(commentId) {
            toggleEditForm(commentId);
            const textarea = document.getElementById(`edit-text-${commentId}`);
            const commentContent = document.getElementById(`comment-content-${commentId}`);
            if (textarea) textarea.value = commentContent ? commentContent.textContent.trim() : '';
        }

        async function confirmEdit(commentId) {
            const texto = document.getElementById(`edit-text-${commentId}`).value.trim();
            if (!texto) {
                alert("SISTEMA: El texto no puede estar vacío.");
                return;
            }

            try {
                const response = await fetch(`/api/comentarios/${commentId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto })
                });

                const result = await response.json();
                if (result.success) {
                    toggleEditForm(commentId);
                    loadComments();
                } else {
                    alert(`SISTEMA: ${result.error || 'No autorizado'}`);
                }
            } catch (err) {
                alert("SISTEMA: Error de enlace con el servidor.");
            }
        }

        async function deleteComment(commentId) {
            if (!confirm('¿Eliminar este comentario? Esta acción no se puede deshacer.')) return;

            try {
                const response = await fetch(`/api/comentarios/${commentId}`, {
                    method: 'DELETE'
                });

                const result = await response.json();
                if (result.success) {
                    loadComments();
                } else {
                    alert(`SISTEMA: ${result.error || 'No autorizado'}`);
                }
            } catch (err) {
                alert("SISTEMA: Error de enlace con el servidor.");
            }
        }

        async function postComment(parentId = null) {
            const usuario = document.getElementById('username').value.trim();
            let texto = '';

            if (parentId) {
                texto = document.getElementById(`reply-text-${parentId}`).value.trim();
            } else {
                texto = document.getElementById('commentText').value.trim();
            }

            if (!usuario || !texto) {
                alert("SISTEMA: Error. Campos incompletos.");
                return;
            }

            localStorage.setItem('dgnv_username', usuario);

            try {
                const response = await fetch('/api/comentarios', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, texto, parent_id: parentId })
                });

                if (response.ok) {
                    if (!parentId) {
                        document.getElementById('commentText').value = '';
                    } else {
                        document.getElementById(`reply-text-${parentId}`).value = '';
                    }
                    loadComments();
                }
            } catch (err) {
                alert("SISTEMA: Error de enlace con el servidor.");
            }
        }
    </script>
</body>
</html>
